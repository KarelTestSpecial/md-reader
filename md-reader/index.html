<!DOCTYPE html>
<html>
<head>
  <title>MD Reader</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }
    #dropzone {
      border: 3px dashed #bbb;
      border-radius: 15px;
      width: 100%;
      flex: 1;
      min-height: 250px;
      text-align: center;
      padding: 40px;
      margin: 0 0 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      background-color: #fff;
      font-size: 1.2rem;
      color: #666;
      transition: all 0.2s ease-in-out;
    }
    #dropzone.hover {
      background-color: #f0f0f0;
    }

    #markdown-input {
      flex: 1;
      min-height: 300px;
      margin-bottom: 20px;
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 15px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      box-sizing: border-box;
      background-color: #fff;
    }

    textarea#markdown-input {
      resize: none;
    }
    
    .action-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    #render-btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
      background-color: #4CAF50;
      color: white;
      transition: background-color 0.2s;
    }
    #render-btn:hover {
      background-color: #45a049;
    }

    .browse-btn {
      background-color: #2196F3;
      color: white;
      cursor: pointer;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      display: inline-block;
      margin: 15px 5px;
      transition: transform 0.1s, background-color 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .browse-btn:hover {
      background-color: #0b7dda;
      transform: translateY(-2px);
    }

    /* Dark mode styles */
    body.dark-mode {
      background-color: #121212;
      color: #e0e0e0;
    }
    body.dark-mode #dropzone {
      border-color: #555;
      background-color: #1e1e1e;
      color: #aaa;
    }
    body.dark-mode #dropzone.hover {
      background-color: #333;
    }
    body.dark-mode #markdown-input {
      background-color: #2a2a2a;
      color: #eee;
      border-color: #555;
    }
    body.dark-mode #render-btn {
      background-color: #333;
      color: #eee;
      border-color: #555;
    }
    body.dark-mode .browse-btn {
      background-color: #1976D2;
      color: white;
    }
    body.dark-mode .browse-btn:hover {
      background-color: #1565C0;
    }

    /* The switch - the box around the slider */
    .theme-switch-wrapper {
      display: flex;
      align-items: center;
    }
    
    em {
      margin-left: 10px;
      font-size: 1rem;
      margin-right: 15px;
      color: #666;
    }
    body.dark-mode em {
      color: #aaa;
    }
    
    .theme-switch {
      position: relative;
      display: inline-block;
      width: 36px; 
      height: 16px;
    }

    /* Hide default HTML checkbox */
    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      -webkit-transition: .4s;
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 12px; 
      width: 12px; 
      left: -1px;
      bottom: 2px;
      background-color: white;
      -webkit-transition: .4s;
      transition: .4s;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:focus + .slider {
      box-shadow: 0 0 1px #2196F3;
    }

    input:checked + .slider:before {
      -webkit-transform: translateX(22px);
      -ms-transform: translateX(22px);
      transform: translateX(22px);
    }

    /* Rounded sliders */
    .slider.round {
      border-radius: 24px; /* Slimmer */
    }

    .slider.round:before {
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div id="dropzone">
    <div style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
      <span>Drop an .md file here</span>
      <label for="file-upload" class="browse-btn">Browse</label>
      <span>or paste the content below</span>
    </div>
    <input type="file" id="file-upload" accept=".md" style="display: none;">
  </div>
  <textarea id="markdown-input" rows="10" cols="40" placeholder="Paste your markdown here..."></textarea>
  <div class="action-bar">
      <button id="render-btn">Render</button>
      <div class="theme-switch-wrapper">
        <em>light / dark </em>
        <label class="theme-switch" for="checkbox">
          <input type="checkbox" id="checkbox" />
          <div class="slider round"></div>
        </label>
      </div>
  </div>
  <script src="marked.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
