<!DOCTYPE html>
<html>
<head>
  <title>MD Reader</title>
  <style>
    #dropzone {
      border: 2px dashed #ccc;
      border-radius: 20px;
      width: 300px;
      height: 200px;
      text-align: center;
      padding: 20px;
      margin: 20px auto;
    }
    #dropzone.hover {
      background-color: #f0f0f0;
    }

    /* Dark mode styles */
    body.dark-mode {
      background-color: #1a1a1a;
      color: #fff;
    }
    body.dark-mode #dropzone {
      border-color: #555;
    }
    body.dark-mode #dropzone.hover {
      background-color: #333;
    }

    /* The switch - the box around the slider */
    .theme-switch-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 15px;
    }
    em {
      margin-left: 10px;
      font-size: 0.9rem;
    }
    .theme-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 18px;
    }

    /* Hide default HTML checkbox */
    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      -webkit-transition: .4s;
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 4px;
      bottom: 2px;
      background-color: white;
      -webkit-transition: .4s;
      transition: .4s;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:focus + .slider {
      box-shadow: 0 0 1px #2196F3;
    }

    input:checked + .slider:before {
      -webkit-transform: translateX(26px);
      -ms-transform: translateX(26px);
      transform: translateX(26px);
    }

    /* Rounded sliders */
    .slider.round {
      border-radius: 34px;
    }

    .slider.round:before {
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div id="dropzone">Sleep een .md-bestand hierheen</div>
  <div class="theme-switch-wrapper">
    <label class="theme-switch" for="checkbox">
      <input type="checkbox" id="checkbox" />
      <div class="slider round"></div>
    </label>
    <em>Dark mode</em>
  </div>
  <script src="marked.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
