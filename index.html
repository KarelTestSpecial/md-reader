<!DOCTYPE html>
<html>
<head>
  <title>MD Reader</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 400px;
      width: 340px;
      margin: 0;
      padding: 10px;
      box-sizing: border-box;
    }
    #dropzone {
      border: 2px dashed #ccc;
      border-radius: 10px;
      width: 100%;
      height: 80px; /* Increased height */
      text-align: center;
      padding: 0;
      margin: 0 0 10px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    #dropzone.hover {
      background-color: #f0f0f0;
    }

    #markdown-input {
      flex-grow: 1;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      padding: 5px;
      font-family: monospace;
    }

    textarea#markdown-input {
      resize: none;
    }
    
    .action-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    #render-btn {
      padding: 4px 10px; /* Slimmer */
      border-radius: 5px;
      border: 1px solid #ccc;
      cursor: pointer;
      font-size: 0.7rem; /* Even Slimmer */
    }

    /* Dark mode styles */
    body.dark-mode {
      background-color: #1a1a1a;
      color: #fff;
    }
    body.dark-mode #dropzone {
      border-color: #555;
    }
    body.dark-mode #dropzone.hover {
      background-color: #333;
    }
    body.dark-mode #markdown-input {
      background-color: #2a2a2a;
      color: #eee;
      border-color: #555;
    }
    body.dark-mode #render-btn {
      background-color: #333;
      color: #eee;
      border-color: #555;
    }

    /* The switch - the box around the slider */
    .theme-switch-wrapper {
      display: flex;
      align-items: center;
    }
    
    em {
      margin-left: 10px;
      font-size: 0.7rem;
      margin-right: 10px;
    }
    
    .theme-switch {
      position: relative;
      display: inline-block;
      width: 36px; 
      height: 16px;
    }

    /* Hide default HTML checkbox */
    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      -webkit-transition: .4s;
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 12px; 
      width: 12px; 
      left: -1px;
      bottom: 2px;
      background-color: white;
      -webkit-transition: .4s;
      transition: .4s;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:focus + .slider {
      box-shadow: 0 0 1px #2196F3;
    }

    input:checked + .slider:before {
      -webkit-transform: translateX(22px);
      -ms-transform: translateX(22px);
      transform: translateX(22px);
    }

    /* Rounded sliders */
    .slider.round {
      border-radius: 24px; /* Slimmer */
    }

    .slider.round:before {
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div id="dropzone">Drop an .md file here or paste the content below</div>
  <textarea id="markdown-input" rows="10" cols="40" placeholder="Paste your markdown here..."></textarea>
  <div class="action-bar">
      <button id="render-btn">Render</button>
      <div class="theme-switch-wrapper">
        <em>light / dark </em>
        <label class="theme-switch" for="checkbox">
          <input type="checkbox" id="checkbox" />
          <div class="slider round"></div>
        </label>
      </div>
  </div>
  <script src="marked.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
